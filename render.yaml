services:
  - type: web
    name: kritique-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate --schema src/prisma/schema.prisma
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kritique-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: kritique-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: kritique-worker
    runtime: node
    rootDir: worker
    buildCommand: npm ci --include=dev && npx prisma generate --schema prisma/schema.prisma
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kritique-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: kritique-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  - type: web
    name: kritique-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: keyvalue
    name: kritique-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: kritique-db
    plan: free
    databaseName: kritique
    user: kritique

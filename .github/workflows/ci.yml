name: Kritique CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint + Unit Tests ─────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kritique
          POSTGRES_PASSWORD: kritique_secret
          POSTGRES_DB: kritique_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate --schema src/prisma/schema.prisma

      - name: Run migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql://kritique:kritique_secret@localhost:5432/kritique_db_test
        run: npx prisma migrate deploy --schema src/prisma/schema.prisma

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_min_32_characters_long
          DATABASE_URL: postgresql://kritique:kritique_secret@localhost:5432/kritique_db_test
          REDIS_URL: redis://localhost:6379
        run: npm test -- --coverage --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── Job 2: Worker Tests ──────────────────────────────────────
  test-worker:
    name: Worker Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Run worker tests
        working-directory: worker
        env:
          NODE_ENV: test
        run: npm test

  # ── Job 3: Docker Build Check ────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-worker]

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all Docker images
        run: docker compose build

      - name: Verify containers start
        run: |
          docker compose up -d postgres redis
          sleep 10
          docker compose ps
          docker compose down

  # ── Job 4: Deploy (main branch only) ─────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        # Uncomment and configure when you have a server (Render/Railway/EC2)
        # uses: appleboy/ssh-action@v1.0.0
        # with:
        #   host: ${{ secrets.DEPLOY_HOST }}
        #   username: ${{ secrets.DEPLOY_USER }}
        #   key: ${{ secrets.DEPLOY_SSH_KEY }}
        #   script: |
        #     cd /opt/kritique
        #     git pull origin main
        #     docker compose pull
        #     docker compose up -d --build
        #     docker compose run --rm backend npx prisma migrate deploy
        run: echo "🚀 Deploy step ready — configure SSH secrets to activate"
